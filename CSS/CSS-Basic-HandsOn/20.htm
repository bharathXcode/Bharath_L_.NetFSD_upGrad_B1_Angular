<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            border: 2px solid black;
            padding: 20px;
            gap: 10px
                /* space between buttons */
        }

        .btn2 {
            margin-left: 10px;
            /* btn2 gets space from btn1*/
        }

        /* space from parent- use padding on parent
        space between  siblings- use marging to gap */
    </style>
</head>

<body>
    <div class="container">
        <button>Button1</button>
        <button>Button2</button>
    </div>
</body>

</html>
