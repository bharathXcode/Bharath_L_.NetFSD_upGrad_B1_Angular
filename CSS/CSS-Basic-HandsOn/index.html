<!DOCTYPE html>
<html>
<head>
    <title>BookVerse - Online Book Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📚 BookVerse</h1>
        <p>Your Gateway to Knowledge</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Best Sellers</a>
        <a href="#">Contact</a>
    </nav>

    <section class="container">

        <h2>Featured Books</h2>

        <div class="book-grid">

            <div class="book-card">
                <img src="https://via.placeholder.com/200x250" alt="Book 1">
                <h3>The Power of Habit</h3>
                <p class="author">Charles Duhigg</p>
                <p class="price">₹499</p>
                <button>Add to Cart</button>
            </div>

            <div class="book-card">
                <img src="https://via.placeholder.com/200x250" alt="Book 2">
                <h3>Atomic Habits</h3>
                <p class="author">James Clear</p>
                <p class="price">₹599</p>
                <button>Add to Cart</button>
            </div>

            <div class="book-card">
                <img src="https://via.placeholder.com/200x250" alt="Book 3">
                <h3>Rich Dad Poor Dad</h3>
                <p class="author">Robert Kiyosaki</p>
                <p class="price">₹399</p>
                <button>Add to Cart</button>
            </div>

            <div class="book-card">
                <img src="https://via.placeholder.com/200x250" alt="Book 4">
                <h3>The Alchemist</h3>
                <p class="author">Paulo Coelho</p>
                <p class="price">₹349</p>
                <button>Add to Cart</button>
            </div>

        </div>

    </section>

    <footer>
        © 2026 BookVerse | All Rights Reserved
    </footer>

</body>
</html>
