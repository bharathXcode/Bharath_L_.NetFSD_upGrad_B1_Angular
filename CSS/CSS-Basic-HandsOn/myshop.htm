<!DOCTYPE html>
<html>

<head>
    <title>MyShop - E-Commerce</title>

    <style>
        /* ===== Global Styles ===== */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h1,
        h2,
        h3 {
            margin: 0;
        }

        /* ===== Header ===== */
        header {
            background-color: #1e272e;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* ===== Navigation ===== */
        nav {
            background-color: #2f3640;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #fbc531;
        }

        /* ===== Main Container ===== */
        .container {
            padding: 30px;
        }

        /* ===== Product Grid ===== */
        .products {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        /* ===== Product Card ===== */
        .card {
            background-color: white;
            width: 23%;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-radius: 5px;
        }

        .price {
            color: #e84118;
            font-size: 20px;
            margin: 10px 0;
            font-weight: bold;
        }

        /* ===== Button ===== */
        .btn {
            background-color: #44bd32;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #2ecc71;
        }

        /* ===== Footer ===== */
        footer {
            background-color: #1e272e;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>

</head>

<body>

    <header>
        <h1>MyShop</h1>
        <p>Your One Stop Online Store 🛍</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Categories</a>
        <a href="#">Cart 🛒</a>
        <a href="#">Login</a>
    </nav>

    <div class="container">

        <h2>Featured Products</h2>
        <br>

        <div class="products">

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Product 1">
                <h3>Smart Watch</h3>
                <p class="price">₹2,999</p>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Product 2">
                <h3>Headphones</h3>
                <p class="price">₹1,499</p>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Product 3">
                <h3>Running Shoes</h3>
                <p class="price">₹3,499</p>
                <button class="btn">Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="Product 4">
                <h3>Backpack</h3>
                <p class="price">₹999</p>
                <button class="btn">Add to Cart</button>
            </div>

        </div>

    </div>

    <footer>
        © 2026 MyShop | All Rights Reserved
    </footer>

</body>

</html>
