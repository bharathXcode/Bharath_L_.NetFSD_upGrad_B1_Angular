<!DOCTYPE html>
<html>

<head>
    <title>Internal CSS Complete Demo</title>

    <style>
        /* Page Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        /* Header */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Content Section */
        .container {
            padding: 20px;
        }

        h2 {
            color: #2c3e50;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        /* Card Box */
        .card {
            background-color: white;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        /* Button */
        .btn {
            background-color: #e67e22;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #d35400;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <header>
        <h1>My Website</h1>
        <p>Complete Internal CSS Demo</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">

        <h2>Welcome Section</h2>
        <p>This page is styled using in-page (internal) CSS.</p>

        <div class="card">
            <h3>Card Title</h3>
            <p>This is a styled card using class selector.</p>
            <button class="btn">Read More</button>
        </div>

    </div>

    <footer>
        © 2026 My Website | Internal CSS Example
    </footer>

</body>

</html>
