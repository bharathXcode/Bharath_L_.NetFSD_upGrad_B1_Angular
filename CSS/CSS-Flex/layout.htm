<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .layout {
            display: flex;
            /*Stack header, main, and footer vertically*/
            flex-direction: column;
            height: 100vh;
        }

        .main {
            display: flex;
            /*Allow sidebar and content to sit side by side*/
            flex: 1;
        }

        aside {
            width: 200px;
        }

        section {
            /*Make content area take up remaining space*/
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="layout">
        <header>Header</header>
        <div class="main">
            <aside>Sidebar</aside>
            <section>Content</section>
        </div>
        <footer>Footer</footer>
    </div>

</body>

</html>
