<!DOCTYPE html>
<html>

<head>
    <title>FlexShop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="navbar">
        <div class="logo">FlexShop</div>
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>New Collection 2026</h1>
            <p>Discover amazing products built using Flexbox.</p>
            <button>Shop Now</button>
        </div>
        <div class="hero-img">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" alt="Shopping Collection">

        </div>
    </section>

    <!-- Product Section -->
    <section class="products">
        <div class="card">
            <h3>Product 1</h3>
            <p>$100</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <h3>Product 2</h3>
            <p>$120</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <h3>Product 3</h3>
            <p>$90</p>
            <button>Add to Cart</button>
        </div>
        <div class="card">
            <h3>Product 4</h3>
            <p>$150</p>
            <button>Add to Cart</button>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div>© 2026 FlexShop</div>
        <div>Privacy</div>
        <div>Terms</div>
    </footer>

</body>

</html>
