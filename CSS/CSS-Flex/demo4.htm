<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cards {
            display: flex;
            /*Allow cards to wrap to the next line on smaller screens*/
            flex-wrap: wrap;
            /*Space between cards*/
            gap: 20px;
        }

        .card {
            /*Make cards flexible and responsive*/
            /*Allow cards to grow and shrink, with a base width of 200px*/
            /*This means each card will take up equal space, but won't shrink below 200px*/
            /*Flex-grow: 1 allows cards to grow and fill available space, while flex-shrink: 1 allows them to shrink if necessary. The flex-basis of 200px sets the initial size of each card.*/
            flex: 1 1 200px;
            background: lightblue;
            padding: 20px;
        }
    </style>
</head>

<body>
    <!-- Responsive Card Layout -->
    <div class="cards">
        <div class="card">1</div>
        <div class="card">2</div>
        <div class="card">3</div>
        <div class="card">4</div>
    </div>
    <!-- Cards automatically wrap on smaller screens. -->
</body>

</html>
