<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 100px 100px;
            gap: 10px;
        }

        .box {
            background: purple;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .item1 {
            /* span two column space*/
            grid-column: 1 / 3;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box item1">Span 2 Columns</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>

</html>
