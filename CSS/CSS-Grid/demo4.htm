<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            /*makes container grid*/
            display: grid;
            /*defined 3 columns*/
            grid-template-columns: 1fr 2fr 1fr;
            /*spacing between rows & columns*/
            gap: 10px;
        }

        .box {
            background-color: teal;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- 3 Column Layout -->
    <div class="container">
        <div class="box">Item 1</div>
        <div class="box">Item 2</div>
        <div class="box">Item 3</div>
    </div>
</body>

</html>
<!-- fr = fractional unit

It represents a portion of the available free space

Space is divided after fixed widths, padding, gaps, etc., are accounted for

Think of fr like ratios, not pixels. -->
