<!DOCTYPE html>
<html>

<head>
    <title>jQuery load() Example</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <h2>Load Example</h2>

    <button id="btnLoad">Load Content</button>

    <div id="result" style="margin-top:20px; border:1px solid black; padding:10px;">
        Content will load here...
    </div>

    <script>
        $(document).ready(function () {
            $("#btnLoad").click(function () {
                $("#result").load("content.html");
            });
        });
    </script>

</body>

</html>
