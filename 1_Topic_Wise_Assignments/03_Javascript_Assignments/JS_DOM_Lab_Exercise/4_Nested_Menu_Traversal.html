<!DOCTYPE html>
<html>
<head>
<title>Lab 4</title>
<style>
#menu ul {
display: none;
transition: all 0.3s ease;
}
</style>
</head>
<body>

<ul id="menu">
<li>Electronics
<ul>
<li>Mobile</li>
<li>Laptop</li>
</ul>
</li>
<li>Clothing
<ul>
<li>Men</li>
<li>Women</li>
</ul>
</li>
</ul>

<script>
const menu = document.getElementById("menu");

menu.addEventListener("click", function (event) {
if (event.target.tagName === "LI") {
const child = event.target.children[0];
if (child && child.tagName === "UL") {
child.style.display =
child.style.display === "block" ? "none" : "block";
}
}
});
</script>

</body>
</html>
