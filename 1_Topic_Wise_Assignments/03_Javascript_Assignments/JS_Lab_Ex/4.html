<!DOCTYPE html>
<html>
<head>
    <title>Display Numbers</title>
</head>
<body>

    <h2>Display Numbers 1 to 10</h2>

    <button onclick="displayNumbers()">Show Numbers</button>

    <div id="output"></div>

    <script>
        function displayNumbers() {
            let result = "";
            
            for (let i = 1; i <= 10; i++) {
                result += i + "<br>";
            }

            document.getElementById("output").innerHTML = result;
        }
    </script>

</body>
</html>
