<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="header">
        <div class="container-fluid d-flex justify-content-between align-items-center px-3">

            <!-- Logo -->
            <div class="logo d-flex align-items-center"
                 onclick="window.location.href='index.html'"
                 style="cursor: pointer;">
                <img src="assets/ab.png" width="40">
                <span>Bharath's Healthcare</span>
            </div>

            <!-- Search Bar (Patient Search) -->
            <div class="input-group w-25">
                <span class="input-group-text">🔍</span>
                <input id="patientSearch"
                       class="form-control"
                       placeholder="Search & (Enter)">
            </div>

            <!-- Navigation -->
            <nav>
                <a href="index.html">Home</a>
                <a href="patients.html">Patients</a>
                <a href="doctors.html">Doctors</a>
                <a href="appointments.html">Appointments</a>
            </nav>

        </div>
    </header>

    <!-- ================= MAIN SECTION ================= -->
    <div class="main">

        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar">
            <h5>Dashboard</h5>

            <!-- Navigation -->
            <a href="#">Book</a>
            <a href="#appointmentList">View Appointment List</a>
        </aside>

        <!-- ========== CONTENT AREA ========== -->
        <div class="content">

            <!-- Back Button -->
            <button onclick="goBack()" class="btn btn-secondary mb-3">
                ← Back
            </button>

            <!-- ===== Booking Form ===== -->
            <h3>Book Appointment</h3>

            <!-- Patient Selection -->
            <label>Patient</label>
            <select id="patient" class="form-control mb-2"></select>

            <!-- Date Selection -->
            <label>Date</label>
            <input type="date" id="date" class="form-control mb-2">

            <!-- Doctor Selection (disabled until date/patient selected) -->
            <label>Doctor</label>
            <select id="doctor" class="form-control mb-2" disabled></select>

            <!-- Time Slot Selection (disabled until doctor selected) -->
            <label>Time Slot</label>
            <select id="slot" class="form-control mb-2" disabled></select>

            <!-- Book Button -->
            <button onclick="book()" class="btn btn-primary">
                Book
            </button>

            <!-- ===== Appointment List ===== -->
            <h3 class="mt-4" id="appointmentList">Appointments</h3>

            <!-- Status Filter -->
            <select id="filter"
                    class="form-control mb-2"
                    onchange="renderAppointments()">
                <option value="">All</option>
                <option>Pending</option>
                <option>Booked</option>
                <option>Completed</option>
                <option>Cancelled</option>
            </select>

            <!-- Appointments Table -->
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th> <!-- Unique appointment ID -->
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tbl"></tbody>
            </table>

        </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        © 2026 Bharath's Healthcare System. All rights reserved. | Privacy Policy | Terms of Service
    </footer>

    <!-- ================= SCRIPTS ================= -->

    <!-- Data utilities (localStorage handling) -->
    <script src="js/data.js"></script>

    <!-- Common reusable functions -->
    <script src="js/common.js"></script>

    <!-- Appointment logic -->
    <script src="js/appointments.js"></script>

</body>
</html>
