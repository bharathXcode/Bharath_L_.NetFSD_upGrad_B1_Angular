<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 4 - Rowspan and Colspan</title>
</head>

<body>

    <h2>Rowspan and Colspan Example</h2>

    <table border="1" cellpadding="8">

        <tr>
            <th>Name</th>
            <th colspan="2">Marks</th>
        </tr>

        <tr>
            <th></th>
            <th>Math</th>
            <th>Science</th>
        </tr>

        <tr>
            <td rowspan="2">Alex</td>
            <td>90</td>
            <td>85</td>
        </tr>

        <tr>
            <td>88</td>
            <td>92</td>
        </tr>

    </table>

</body>

</html>
