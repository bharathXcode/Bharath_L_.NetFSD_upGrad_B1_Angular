<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Complete Table Demo</title>
</head>

<body>

    <h1>Complete Table Example</h1>

    <table border="2" cellpadding="10" cellspacing="5">

        <thead>
            <tr>
                <th rowspan="2">Student</th>
                <th colspan="2">Marks</th>
            </tr>
            <tr>
                <th>Math</th>
                <th>Science</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>John</td>
                <td>85</td>
                <td>90</td>
            </tr>
            <tr>
                <td>Mary</td>
                <td>88</td>
                <td>92</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th>Total Students</th>
                <th colspan="2">2</th>
            </tr>
        </tfoot>

    </table>

</body>

</html>
