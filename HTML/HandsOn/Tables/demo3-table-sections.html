<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 3 - Table Sections</title>
</head>

<body>

    <h2>Table with Head, Body and Footer</h2>

    <table border="1" cellpadding="8">

        <thead>
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Pen</td>
                <td>10</td>
                <td>100</td>
            </tr>
            <tr>
                <td>Book</td>
                <td>5</td>
                <td>250</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="2">Total</th>
                <th>350</th>
            </tr>
        </tfoot>

    </table>

</body>

</html>
