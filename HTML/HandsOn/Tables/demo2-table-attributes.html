<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 2 - Table Attributes</title>
</head>

<body>

    <h2>Table Attributes Example</h2>

    <table border="10" cellpadding="10" cellspacing="5">
        <tr>
            <th>Product</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Laptop</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>Mobile</td>
            <td>20000</td>
        </tr>
    </table>

</body>

</html>
