<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 1 - Basic Table</title>
</head>

<body>

    <h2>Basic Table Structure</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>John</td>
            <td>25</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td>Mary</td>
            <td>28</td>
            <td>Mumbai</td>
        </tr>
    </table>

</body>

</html>
