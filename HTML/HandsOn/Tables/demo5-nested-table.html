<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 5 - Nested Table</title>
</head>

<body>

    <h2>Nested Table Example</h2>

    <table border="1" cellpadding="10">

        <tr>
            <th>Employee</th>
            <th>Details</th>
        </tr>

        <tr>
            <td>John</td>
            <td>
                <table border="1" cellpadding="5">
                    <tr>
                        <th>Department</th>
                        <td>IT</td>
                    </tr>
                    <tr>
                        <th>Experience</th>
                        <td>5 Years</td>
                    </tr>
                </table>
            </td>
        </tr>

    </table>

</body>

</html>
