<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 1 - Basic Entities</title>
</head>

<body>

    <h2>Why We Need Character Entities</h2>

    <p>
        If we write <b>
            <h1>
        </b> directly, browser treats it as a tag.
    </p>

    <p>
        Correct way using entities:
        &lt;h1&gt;
    </p>

</body>

</html>
