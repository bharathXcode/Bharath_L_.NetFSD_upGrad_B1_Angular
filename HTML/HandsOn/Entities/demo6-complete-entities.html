<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Complete Character Entities Demo</title>
</head>

<body>

    <h1>HTML Character Entities</h1>

    <h2>Special Characters</h2>
    <p>&lt;html&gt; &lt;body&gt; &lt;/body&gt; &lt;/html&gt;</p>

    <p>Use &amp; for ampersand.</p>

    <p>Spacing Example: HTML&nbsp;&nbsp;&nbsp;Course</p>

    <hr>

    <h2>Currency</h2>
    <p>&dollar; &euro; &pound; &yen;</p>

    <hr>

    <h2>Legal Symbols</h2>
    <p>&copy; 2026 Company Name</p>
    <p>&reg; Registered</p>
    <p>&trade; Trademark</p>

</body>

</html>
