<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 6 - Subscript and Superscript</title>
</head>

<body>

    <h2>Scientific and Mathematical Formatting</h2>

    <p>Water Formula: H<sub>2</sub>O</p>
    <p>Carbon Dioxide: CO<sub>2</sub></p>

    <p>Square: X<sup>2</sup></p>
    <p>Cube: 10<sup>3</sup></p>

</body>

</html>
