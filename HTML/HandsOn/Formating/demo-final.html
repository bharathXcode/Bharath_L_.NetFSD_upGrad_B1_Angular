<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Complete Text Formatting Demo</title>
</head>

<body>

    <h1>HTML Text Formatting</h1>

    <p>This is a paragraph.</p>

    <p>
        This is <b>bold</b>,
        <i>italic</i>,
        <u>underlined</u>,
        <strong>important</strong>,
        and <em>emphasized</em> text.
    </p>

    <p>Water: H<sub>2</sub>O</p>
    <p>Square: X<sup>2</sup></p>

    <p><small>Small text example</small></p>
    <p><big>Big text example</big></p>

    <hr>

    <pre>
Formatted Resume Block

Name: Student Name
Course: HTML Training
Batch: Morning
</pre>

</body>

</html>
