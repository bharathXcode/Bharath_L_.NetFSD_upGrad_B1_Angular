<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Demo 7 - Preformatted Text</title>
</head>

<body>

    <h2>Normal Text (Spaces Ignored)</h2>

    Name: John
    Age: 25
    Location: India

    <hr>

    <h2>Preformatted Text</h2>

    <pre>
Name: John
Age: 25
Location: India

    Spaces are preserved
    Alignment is maintained
</pre>

</body>

</html>
