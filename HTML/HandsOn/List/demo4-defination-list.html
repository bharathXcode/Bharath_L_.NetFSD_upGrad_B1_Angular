<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>

<head>
    <title>Definition List Demo</title>
</head>

<body>

    <h1>Definition List Example</h1>

    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language used to create web pages.</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets used for styling web pages.</dd>

        <dt>Browser</dt>
        <dd>Software application used to view websites.</dd>
    </dl>

    <hr>

    <h3>Multiple Descriptions for One Term</h3>

    <dl>
        <dt>HTML</dt>
        <dd>Markup language</dd>
        <dd>Used for structuring web content</dd>
    </dl>

</body>

</html>
