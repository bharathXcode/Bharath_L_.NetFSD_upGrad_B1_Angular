<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>

<head>
    <title>Unordered List Demo</title>
</head>

<body bgcolor="#ffffff">

    <h1>Unordered List Example</h1>

    <p>Programming Languages:</p>

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>Python</li>
    </ul>

    <hr>

    <h3>Unordered List with Different Bullet Styles</h3>

    <ul type="square">
        <li>Apple</li>
        <li>Mango</li>
    </ul>

    <ul type="circle">
        <li>Car</li>
        <li>Bike</li>
    </ul>

</body>

</html>
