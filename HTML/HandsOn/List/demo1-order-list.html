<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>

<head>
    <title>Ordered List Demo</title>
</head>

<body bgcolor="#f2f2f2">

    <h1>Ordered List Example</h1>
    <p>Steps to Create an HTML Page:</p>

    <ol>
        <li>Open Notepad or any text editor</li>
        <li>Write HTML structure</li>
        <li>Save file as index.html</li>
        <li>Open the file in browser</li>
    </ol>

    <hr>

    <h3>Ordered List with Type Attribute</h3>

    <ol type="A">
        <li>Introduction</li>
        <li>Body</li>
        <li>Conclusion</li>
    </ol>

</body>

</html>
