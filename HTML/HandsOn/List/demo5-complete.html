<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>

<head>
    <title>All List Types Demo</title>
</head>

<body bgcolor="#eef2f7">

    <h1>HTML List Demonstration</h1>

    <h2>Ordered List</h2>
    <ol>
        <li>Plan</li>
        <li>Design</li>
        <li>Develop</li>
    </ol>

    <h2>Unordered List</h2>
    <ul type="square">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h2>Nested List</h2>
    <ul>
        <li>Web Development
            <ul>
                <li>Frontend</li>
                <li>Backend</li>
            </ul>
        </li>
    </ul>

    <h2>Definition List</h2>
    <dl>
        <dt>List</dt>
        <dd>A collection of related items.</dd>
    </dl>

</body>

</html>
