<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>

<head>
    <title>Complete Image Demo</title>
</head>

<body>

    <h1>HTML Images Demo</h1>

    <h2>Basic Image</h2>
    <img src="sample.jpg" alt="Sample Image" width="250">

    <hr>

    <h2>Image in Subfolder</h2>
    <img src="images/logo.png" alt="Logo Image" width="200">

    <hr>

    <h2>Clickable Image</h2>
    <a href="https://www.wikipedia.org" target="_blank">
        <img src="sample.jpg" alt="Click to Visit Wikipedia" width="200">
    </a>

    <hr>

    <h2>Image Formats</h2>
    <p>JPEG, PNG, and GIF examples displayed above.</p>

</body>

</html>
