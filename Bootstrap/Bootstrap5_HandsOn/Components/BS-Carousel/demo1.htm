<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bootstrap Carousel Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .carousel-item img {
            height: 500px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Bootstrap Carousel Demo</h2>

        <div id="myCarousel" class="carousel slide" data-bs-ride="carousel">

            <!-- Indicators -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
            </div>

            <!-- Slides -->
            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=1600" class="d-block w-100"
                        alt="Laptop">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Laptop Collection</h5>
                        <p>Powerful performance for professionals.</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=1600" class="d-block w-100"
                        alt="Smartphone">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Latest Smartphones</h5>
                        <p>Experience next-level technology.</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1600" class="d-block w-100"
                        alt="Headphones">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Wireless Headphones</h5>
                        <p>Crystal clear sound quality.</p>
                    </div>
                </div>

            </div>

            <!-- Controls -->
            <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
