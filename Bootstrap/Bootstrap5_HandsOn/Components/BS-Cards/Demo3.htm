<!DOCTYPE html>
<html lang="en">

<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>

  <div class="container">
    <style>
      .product-card:hover {
        transform: scale(1.03);
        transition: 0.3s;
      }
    </style>

    <div class="card product-card shadow h-100">
      <span class="badge bg-danger position-absolute m-2">Sale</span>
      <img src="https://cdn.dummyjson.com/product-images/6/1.png" class="card-img-top p-3"
        style="height:250px; object-fit:contain;">
      <div class="card-body text-center">
        <h5 class="card-title">MacBook Pro</h5>
        <p class="card-text text-success fw-bold">$1749</p>
        <button class="btn btn-primary w-100">Add to Cart</button>
      </div>
    </div>
  </div>

</body>

</html>
