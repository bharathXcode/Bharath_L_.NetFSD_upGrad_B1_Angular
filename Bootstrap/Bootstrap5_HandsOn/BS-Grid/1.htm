<!DOCTYPE html>
<html>
<!-- Equal width columns using col -->

<head>
    <title>Demo 1 - Basic Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">
        <h3 class="text-center">Basic 3 Equal Columns</h3>
        <div class="row">
            <div class="col bg-primary text-white p-3">Column 1</div>
            <div class="col bg-success text-white p-3">Column 2</div>
            <div class="col bg-danger text-white p-3">Column 3</div>
        </div>
    </div>

</body>

</html>
