<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShopMax</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">
<div class="container-fluid">
<button class="btn btn-warning" data-bs-toggle="offcanvas" data-bs-target="#menu">
Menu
</button>
<span class="navbar-brand fw-bold">ShopMax</span>
</div>
</nav>

<div class="offcanvas offcanvas-start" id="menu">
<div class="offcanvas-header">
<h5>Categories</h5>
<button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>
<div class="offcanvas-body">
<ul class="list-group">
<li class="list-group-item">Mobiles</li>
<li class="list-group-item">Laptops</li>
<li class="list-group-item">Accessories</li>
</ul>
</div>
</div>

<section class="bg-dark text-white text-center py-5">
<h1 class="display-5 fw-bold">Mega Sale</h1>
<p class="lead">Up to 50% Discount</p>
<button class="btn btn-warning btn-lg">Shop Now</button>
</section>

<div id="carousel" class="carousel slide container my-5" data-bs-ride="carousel">
<div class="carousel-inner rounded shadow">

<div class="carousel-item active">
<img src="https://valuehubkenya.co.ke/wp-content/uploads/2025/11/Best-gadgets-for-young-professionals-Kenya-value-hub-kenya1.png" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="" class="d-block w-100">
</div>

</div>
</div>

<section class="container text-center py-5">
<h4 class="fw-bold">Subscribe to Newsletter</h4>
<input type="email" class="form-control w-50 mx-auto my-3" placeholder="Enter email">
<button class="btn btn-primary">Subscribe</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
