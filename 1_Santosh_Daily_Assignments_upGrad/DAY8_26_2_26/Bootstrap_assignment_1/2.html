<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ElectroStore</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
<h2 class="text-center fw-bold mb-5">Featured Products</h2>

<div class="row g-4">

<div class="col-12 col-md-6 col-lg-3">
<div class="card h-100 shadow border-0">
<img src="https://via.placeholder.com/300x200" class="card-img-top">
<div class="card-body text-center">
<h5 class="fw-bold">Smartphone</h5>
<p class="text-muted">$499</p>
<button class="btn btn-primary w-100 mb-2">Add to Cart</button>
<button class="btn btn-outline-dark w-100">View Details</button>
</div>
</div>
</div>

<div class="col-12 col-md-6 col-lg-3">
<div class="card h-100 shadow border-0">
<img src="https://via.placeholder.com/300x200" class="card-img-top">
<div class="card-body text-center">
<h5 class="fw-bold">Laptop</h5>
<p class="text-muted">$899</p>
<button class="btn btn-primary w-100 mb-2">Add to Cart</button>
<button class="btn btn-outline-dark w-100">View Details</button>
</div>
</div>
</div>

</div>
</div>

</body>
</html>
