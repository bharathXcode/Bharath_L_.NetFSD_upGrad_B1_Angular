<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
<div class="container">
<a class="navbar-brand fw-bold">Event Manager</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active">Dashboard</a></li>
<li class="nav-item"><a class="nav-link">Events</a></li>
</ul>
</div>
</div>
</nav>

<div class="container py-5">
<div class="row g-4">

<div class="col-lg-8">
<div class="card shadow border-0">
<div class="card-body">
<h4 class="fw-bold mb-3">Upcoming Events</h4>
<ul class="list-group list-group-flush">
<li class="list-group-item">Tech Fest 2026</li>
<li class="list-group-item">Coding Hackathon</li>
<li class="list-group-item">Cultural Night</li>
</ul>
</div>
</div>
</div>

<div class="col-lg-4 text-center">
<button class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#modal">
Add New Event
</button>
</div>

</div>
</div>

<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header bg-primary text-white">
<h5>Add Event</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<form>
<div class="mb-3">
<label class="form-label">Event Name</label>
<input type="text" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Date</label>
<input type="date" class="form-control" required>
</div>
<button class="btn btn-primary w-100">Submit</button>
</form>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
