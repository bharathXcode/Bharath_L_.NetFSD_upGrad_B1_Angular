<!DOCTYPE html>
<html>
<head>
<title>Counter App</title>
<style>
body{
font-family:Arial;
background:linear-gradient(120deg,#84fab0,#8fd3f4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
h1{font-size:40px}
button{
margin:10px;
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}
.increment{background:#007bff;color:white}
.reset{background:#dc3545;color:white}
</style>
</head>
<body>

<div class="box">
<h1 id="counter">0</h1>
<button class="increment" id="incBtn">Increment</button>
<button class="reset" id="resetBtn">Reset</button>
</div>

<script>
let counterValue = 0

function incrementCounter(step){
counterValue += step
document.getElementById("counter").innerText = counterValue
}

function resetCounter(){
counterValue = 0
document.getElementById("counter").innerText = counterValue
}

document.getElementById("incBtn").addEventListener("click", function(){
incrementCounter(1)
})

document.getElementById("resetBtn").addEventListener("click", resetCounter)
</script>

</body>
</html>
