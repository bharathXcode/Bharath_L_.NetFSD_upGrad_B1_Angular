<!DOCTYPE html>
<html>
<head>
<title>Exercise 11</title>
<style>
.step{display:none}
.active{display:block}
#progressContainer{width:300px;height:10px;background:#ddd;margin-bottom:20px}
#progress{height:10px;width:0;background:green}
</style>
</head>
<body>

<div id="progressContainer">
<div id="progress"></div>
</div>

<form id="form">

<div class="step active">
<h3>Step 1 - Personal Info</h3>
<input type="text" id="name" placeholder="Name">
<br><br>
<button type="button" id="next1">Next</button>
</div>

<div class="step">
<h3>Step 2 - Address</h3>
<input type="text" id="address" placeholder="Address">
<br><br>
<button type="button" id="back1">Back</button>
<button type="button" id="next2">Next</button>
</div>

<div class="step">
<h3>Step 3 - Confirmation</h3>
<p id="summary"></p>
<br>
<button type="button" id="back2">Back</button>
<button type="submit">Submit</button>
</div>

</form>

<h3 id="message"></h3>

<script>
const steps=document.querySelectorAll(".step")
const progress=document.getElementById("progress")
let current=0

function showStep(index){
steps.forEach(s=>s.classList.remove("active"))
steps[index].classList.add("active")
progress.style.width=((index+1)/3)*100+"%"
}

document.getElementById("next1").onclick=function(){
if(document.getElementById("name").value.trim()!==""){
current=1
showStep(current)
}
}

document.getElementById("next2").onclick=function(){
if(document.getElementById("address").value.trim()!==""){
document.getElementById("summary").innerText=
"Name: "+document.getElementById("name").value+
" | Address: "+document.getElementById("address").value
current=2
showStep(current)
}
}

document.getElementById("back1").onclick=function(){
current=0
showStep(current)
}

document.getElementById("back2").onclick=function(){
current=1
showStep(current)
}

document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault()
document.getElementById("message").innerText="Form Submitted Successfully"
})
</script>

</body>
</html>
