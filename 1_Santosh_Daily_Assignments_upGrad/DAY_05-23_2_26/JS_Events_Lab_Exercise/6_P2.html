<!DOCTYPE html>
<html>
<head>
<title>Exercise 6</title>
<style>
input{display:block;margin:10px 0;padding:5px}
.error{color:red;font-size:12px}
.success{color:green}
.focus{border:2px solid blue}
</style>
</head>
<body>

<form id="form">
<input type="text" id="name" placeholder="Name">
<div id="nameError" class="error"></div>

<input type="email" id="email" placeholder="Email">
<div id="emailError" class="error"></div>

<input type="password" id="password" placeholder="Password">
<div id="passError" class="error"></div>

<button type="submit">Submit</button>
</form>

<div id="result"></div>

<script>
const form=document.getElementById("form")
const nameInput=document.getElementById("name")
const emailInput=document.getElementById("email")
const passInput=document.getElementById("password")
const result=document.getElementById("result")

function validateName(){
if(nameInput.value.trim().length<3){
document.getElementById("nameError").innerText="Name must be 3+ characters"
return false
}else{
document.getElementById("nameError").innerText=""
return true
}
}

function validateEmail(){
if(!emailInput.value.includes("@")){
document.getElementById("emailError").innerText="Invalid email"
return false
}else{
document.getElementById("emailError").innerText=""
return true
}
}

function validatePass(){
if(passInput.value.length<6){
document.getElementById("passError").innerText="Min 6 characters"
return false
}else{
document.getElementById("passError").innerText=""
return true
}
}

[nameInput,emailInput,passInput].forEach(input=>{
input.addEventListener("focus",()=>input.classList.add("focus"))
input.addEventListener("blur",()=>input.classList.remove("focus"))
})

nameInput.addEventListener("blur",validateName)
emailInput.addEventListener("blur",validateEmail)
passInput.addEventListener("blur",validatePass)

form.addEventListener("submit",function(e){
e.preventDefault()
if(validateName()&&validateEmail()&&validatePass()){
result.innerText="Form Submitted Successfully"
result.className="success"
}else{
result.innerText=""
}
})
</script>

</body>
</html>
