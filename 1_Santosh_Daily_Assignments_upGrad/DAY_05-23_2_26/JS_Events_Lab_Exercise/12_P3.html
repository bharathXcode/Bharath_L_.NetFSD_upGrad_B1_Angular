<!DOCTYPE html>
<html>
<head>
<title>Exercise 12</title>
<style>
.grid{display:grid;grid-template-columns:repeat(5,60px);gap:5px}
.box{width:60px;height:60px;background:lightgray;display:flex;align-items:center;justify-content:center;cursor:pointer}
.active{background:yellow}
.disabled{background:black;color:white}
</style>
</head>
<body>

<div class="grid" id="grid"></div>
<h3 id="coords"></h3>

<script>
const grid=document.getElementById("grid")

for(let r=1;r<=5;r++){
for(let c=1;c<=5;c++){
const div=document.createElement("div")
div.className="box"
div.dataset.row=r
div.dataset.col=c
div.innerText=r+","+c
grid.appendChild(div)
}
}

grid.addEventListener("click",function(e){
if(e.target.classList.contains("box")&&!e.target.classList.contains("disabled")){
e.target.classList.toggle("active")
document.getElementById("coords").innerText=
"Row: "+e.target.dataset.row+" Col: "+e.target.dataset.col
}
})

grid.addEventListener("dblclick",function(e){
if(e.target.classList.contains("box")&&!e.target.classList.contains("disabled")){
e.target.style.background="blue"
}
})

grid.addEventListener("contextmenu",function(e){
if(e.target.classList.contains("box")){
e.preventDefault()
e.target.classList.add("disabled")
}
})
</script>

</body>
</html>
