<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Page</title>

<style>
body{
margin:0;
font-family:Arial;
background-color:white;
font-size:18px;
}

nav{
display:flex;
justify-content:space-around;
background:#333;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
}

@media(max-width:768px){
body{
background-color:lightblue;
font-size:14px;
}

nav{
flex-direction:column;
align-items:center;
}
}
</style>
</head>
<body>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<h1>Responsive Webpage</h1>
<p>This page adapts to screen size.</p>

</body>
</html>
