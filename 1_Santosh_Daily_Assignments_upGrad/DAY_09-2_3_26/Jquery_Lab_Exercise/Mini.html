<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 30px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            padding: 6px;
            margin: 5px;
        }

        button {
            padding: 6px 10px;
            margin: 5px;
            cursor: pointer;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 95%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        th {
            background: lightgray;
        }

        #toast {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: green;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .controls {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h2>Student Management System</h2>

<!-- Form Section -->
<input type="hidden" id="studentId">
<input type="text" id="name" placeholder="Student Name">
<input type="number" id="age" placeholder="Age">
<select id="grade">
    <option value="">Select Grade</option>
    <option>A</option>
    <option>B</option>
    <option>C</option>
</select>
<button id="saveBtn">Save</button>

<br><br>

<!-- Search + Filter -->
<input type="text" id="search" placeholder="Search by Name">
<select id="filterGrade">
    <option value="">Filter by Grade</option>
    <option>A</option>
    <option>B</option>
    <option>C</option>
</select>

<div id="toast"></div>

<!-- Table -->
<table>
    <thead>
        <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Age</th>
            <th>Grade</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="studentTable"></tbody>
</table>

<!-- Pagination -->
<div class="controls">
    <button id="prevBtn">Previous</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Next</button>
</div>

<script>

const apiURL = "http://localhost:3000/students";
let studentsData = [];
let currentPage = 1;
let rowsPerPage = 5;

$(document).ready(function(){

    loadStudents();

    $("#saveBtn").click(saveStudent);
    $("#search").keyup(applyFilters);
    $("#filterGrade").change(applyFilters);
    $("#prevBtn").click(function(){ changePage(-1); });
    $("#nextBtn").click(function(){ changePage(1); });

});

// ================= LOAD STUDENTS =================
function loadStudents(){
    $.get(apiURL, function(data){
        studentsData = data;
        displayStudents();
    });
}

// ================= DISPLAY STUDENTS =================
function displayStudents(){

    let filtered = applySearchAndFilter();
    let totalPages = Math.ceil(filtered.length / rowsPerPage);

    if(currentPage > totalPages) currentPage = totalPages || 1;

    let start = (currentPage - 1) * rowsPerPage;
    let paginatedData = filtered.slice(start, start + rowsPerPage);

    $("#studentTable").empty();

    $.each(paginatedData, function(index, student){
        $("#studentTable").append(`
            <tr>
                <td>${start + index + 1}</td>
                <td>${student.name}</td>
                <td>${student.age}</td>
                <td>${student.grade}</td>
                <td>
                    <button onclick="editStudent(${student.id})">Edit</button>
                    <button onclick="deleteStudent(${student.id})">Delete</button>
                </td>
            </tr>
        `);
    });

    $("#pageInfo").text("Page " + currentPage + " of " + (totalPages || 1));
}

// ================= SAVE STUDENT =================
function saveStudent(){

    let id = $("#studentId").val();
    let name = $("#name").val().trim();
    let age = $("#age").val();
    let grade = $("#grade").val();

    if(name === "" || age === "" || grade === ""){
        alert("All fields are required!");
        return;
    }

    let studentObj = {
        name: name,
        age: Number(age),
        grade: grade
    };

    if(id){ // UPDATE
        $.ajax({
            url: apiURL + "/" + id,
            type: "PUT",
            contentType: "application/json",
            data: JSON.stringify({ id: Number(id), ...studentObj }),
            success: function(){
                showToast("Student Updated Successfully");
                resetForm();
                loadStudents();
            }
        });
    } else { // ADD
        $.ajax({
            url: apiURL,
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(studentObj),
            success: function(){
                showToast("Student Added Successfully");
                resetForm();
                loadStudents();
            }
        });
    }
}

// ================= EDIT =================
function editStudent(id){
    $.get(apiURL + "/" + id, function(student){
        $("#studentId").val(student.id);
        $("#name").val(student.name);
        $("#age").val(student.age);
        $("#grade").val(student.grade);
    });
}

// ================= DELETE =================
function deleteStudent(id){
    if(confirm("Are you sure you want to delete this student?")){
        $.ajax({
            url: apiURL + "/" + id,
            type: "DELETE",
            success: function(){
                showToast("Student Deleted Successfully");
                loadStudents();
            }
        });
    }
}

// ================= SEARCH + FILTER =================
function applyFilters(){
    currentPage = 1;
    displayStudents();
}

function applySearchAndFilter(){
    let searchValue = $("#search").val().toLowerCase();
    let gradeFilter = $("#filterGrade").val();

    return studentsData.filter(student =>
        student.name.toLowerCase().includes(searchValue) &&
        (gradeFilter === "" || student.grade === gradeFilter)
    );
}

// ================= PAGINATION =================
function changePage(direction){
    currentPage += direction;
    displayStudents();
}

// ================= RESET FORM =================
function resetForm(){
    $("#studentId").val("");
    $("#name").val("");
    $("#age").val("");
    $("#grade").val("");
}

// ================= TOAST =================
function showToast(message){
    $("#toast").text(message).fadeIn().delay(2000).fadeOut();
}

</script>

</body>
</html>
