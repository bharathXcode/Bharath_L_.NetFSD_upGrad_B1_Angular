<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store</title>
    <style>
        body {
            font-family: Arial;
            background-color: lightgray;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        .container {
            width: 80%;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            background-color: navy;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: green;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background-color: lightyellow;
            border-radius: 8px;
            text-align: left;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background-color: darkblue;
            color: white;
        }

        th, td {
            border: 1px solid gray;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: lightblue;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Online Book Store Inventory</h1>

    <button onclick="displayTitles()">Display Titles</button>
    <button onclick="totalInventory()">Total Inventory Value</button>
    <button onclick="costlyBooks()">Books Above 500</button>
    <button onclick="increasePrice()">Increase Price 5%</button>
    <button onclick="sortBooks()">Sort by Price</button>
    <button onclick="removeBook()">Remove Book ID 2</button>
    <button onclick="checkStock()">Check Stock</button>

    <div class="output" id="result"></div>
</div>

<script>
let books = [
  { id: 1, title: "JavaScript Basics", price: 450, stock: 10 },
  { id: 2, title: "React Guide", price: 650, stock: 5 },
  { id: 3, title: "Node.js Mastery", price: 550, stock: 8 },
  { id: 4, title: "CSS Complete", price: 300, stock: 12 }
];

function displayTitles(){
    let titles = books.map(book => book.title).join(", ");
    document.getElementById("result").innerHTML = "<b>Book Titles:</b><br>" + titles;
}

function totalInventory(){
    let total = books.reduce((sum, book) => sum + (book.price * book.stock), 0);
    document.getElementById("result").innerHTML = "<b>Total Inventory Value:</b> ₹" + total;
}

function costlyBooks(){
    let costly = books.filter(book => book.price > 500);
    displayTable(costly);
}

function increasePrice(){
    books = books.map(book => ({
        ...book,
        price: Math.round(book.price * 1.05)
    }));
    displayTable(books);
}

function sortBooks(){
    books.sort((a,b) => a.price - b.price);
    displayTable(books);
}

function removeBook(){
    books = books.filter(book => book.id !== 2);
    displayTable(books);
}

function checkStock(){
    let out = books.some(book => book.stock === 0);
    document.getElementById("result").innerHTML = 
        out ? "<b>Some books are out of stock</b>" 
            : "<b>All books are in stock</b>";
}

/* BONUS */

function displayTable(data){
    let table = "<table><tr><th>ID</th><th>Title</th><th>Price</th><th>Stock</th></tr>";
    data.forEach(book => {
        table += `<tr>
                    <td>${book.id}</td>
                    <td>${book.title}</td>
                    <td>₹${book.price}</td>
                    <td>${book.stock}</td>
                  </tr>`;
    });
    table += "</table>";
    document.getElementById("result").innerHTML = table;
}
</script>

</body>
</html>
