<!DOCTYPE html>
<html>

<head>
    <title>SmartCart</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">🛒 SmartCart</a>

        <div class="ms-auto text-white">
            <span id="userInfo"></span>
            <button class="btn btn-sm btn-danger ms-3" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container my-4">

        <!-- PRODUCTS -->
        <h3 class="mb-3">Products</h3>
        <div class="row" id="productList"></div>

        <hr>

        <!-- CART -->
        <h3>Cart (<span id="cartCount">0</span>)</h3>
        <ul class="list-group mb-3" id="cartList"></ul>

        <div class="alert alert-success">
            Total: ₹ <strong id="totalAmount">0</strong>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
