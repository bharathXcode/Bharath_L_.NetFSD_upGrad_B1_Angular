<!DOCTYPE html>
<html>

<body>

    <input type="text" id="clip" placeholder="Copy or Paste here">

    <script>
        const clip = document.getElementById("clip");

        clip.addEventListener("copy", () => alert("Text Copied!"));
        clip.addEventListener("paste", () => alert("Text Pasted!"));
        clip.addEventListener("cut", () => alert("Text Cut!"));
    </script>

</body>

</html>
