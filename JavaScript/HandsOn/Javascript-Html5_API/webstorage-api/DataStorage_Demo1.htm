<!DOCTYPE html>
<html>

<head>
	<title></title>
	<script>
		function save() {
			let un = document.getElementById('t1').value;
			//set value
			localStorage.setItem('uname', un);
			alert('saved');
		}
		const read = function () {
			//get value
			var uname = localStorage.getItem('uname');
			console.log(uname);
			document.getElementById('result').innerText = 'Good Morning ' + uname;
		};
	</script>
</head>
<body>
	<div id='result'></div>
	<input type="text" id='t1'>
	<input type="button" onclick="save()" value="save">
	<input type="button" value="read" id="btnRead" onclick="read()">

</body>

</html>
