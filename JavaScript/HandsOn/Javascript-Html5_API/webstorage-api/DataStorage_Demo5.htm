<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Store Object details in LocalStorage</h3>
    <div>
        <input type="text" placeholder="Enter Name" id="name">
        <input type="number" placeholder="Enter Age" id="age">
        <button onclick="saveUser()">Save</button>
        <button onclick="readUser()">Read</button>
        <p id="output"></p>
    </div>
    <script>
        function saveUser() {
            let uname = document.getElementById('name').value
            let age = document.getElementById('age').value
            //javascript object
            let user = {
                name: uname,
                age: age
            }
            //save object details
            localStorage.setItem('user', JSON.stringify(user))
            alert('User saved')
        }
        function readUser() {
            let data = localStorage.getItem('user');
            if (data) {
                //JSON.parse() convert object ot json object
                let user = JSON.parse(data)
                document.getElementById('output').innerHTML = `
                Name:${user.name} Age:${user.age}
                `
            } else {
                document.getElementById('output').innerHTML = 'No Data Found';
            }
        }
    </script>
</body>

</html>
